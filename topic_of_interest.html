<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A Topic Of Interest To Me</title>
    <link rel="stylesheet" href="./css/main.css" />
    <script src="./js/jquery.min.js"></script>
    <script src="./js/main.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/velocity/2.0.6/velocity.min.js"></script>
  </head>
  <body>
    <h1>Topic of interest</h1>
    <section id="my_background">
      <h2>content change</h2>
      <div>
        <div id="targetText" class="container">
          🌌 Click Below to Change Text
        </div>
        <div class="btn-group">
          <button id="clickBtn">🔘 Change Text</button>
          <button id="hoverBtn">🖱️ Hover to Change</button>
          <button id="leaveBtn">📤 Change on Mouse Leave</button>
        </div>
      </div>
    </section>

    <section id="my_background">
      <h2>image swap</h2>
      <div>
        <div>
          <img
            id="myImage"
            src="images\more_about_me_1.jpg"
            data-original="images\more_about_me_1.jpg"
            data-new="images\more_about_me_2.jpg"
          />
        </div>
      </div>
    </section>

    <section id="my_background">
      <h2>animation</h2>
      <div class="animation-box container">
        <div id="move-target">🚀</div>
      </div>
      <div class="anim-buttons">
        <button id="up">Up</button>
        <button id="down">Down</button>
        <button id="left">Left</button>
        <button id="right">Right</button>
        <button id="reset">🔄 Reset</button>
      </div>
    </section>
    <section id="my_background">
      <h2>velocity</h2>
      <div class="velocity-box container">
        <div class="ball"></div>
      </div>
      <div>
        <button id="shake">Shake</button>
      </div>
    </section>
    <section>
      <h1>Links</h1>
      <a href="index.html">Home Page</a>
    </section>
  </body>
</html>
